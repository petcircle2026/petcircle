# Render Blueprint — PetCircle Backend Services (dev + production)
# https://render.com/docs/blueprint-spec
#
# Branch strategy: feature/* → dev → main
# Frontend hosted on Vercel. Cron jobs run via GitHub Actions.
# This file defines backend API services only.

services:
  # --- Dev API ---
  - type: web
    name: petcircle-api-dev
    env: docker
    region: singapore
    plan: free
    branch: dev
    rootDir: .
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: APP_ENV
        value: development
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET_NAME
        value: petcircle-documents-dev
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: WHATSAPP_TEMPLATE_REMINDER
        value: petcircle_reminder_v1
      - key: WHATSAPP_TEMPLATE_OVERDUE
        value: petcircle_overdue_v1
      - key: WHATSAPP_TEMPLATE_NUDGE
        value: petcircle_nudge_v1
      - key: WHATSAPP_TEMPLATE_CONFLICT
        value: petcircle_conflict_v1
      - key: WHATSAPP_TEMPLATE_ONBOARDING_COMPLETE
        value: petcircle_onboarding_complete_v1
      - key: WHATSAPP_TEMPLATE_ORDER_FULFILLMENT_CHECK
        value: order_fulfillment_check_v1
      - key: WHATSAPP_TEMPLATE_BIRTHDAY
        value: birthday_celebration_v1
      - key: ADMIN_SECRET_KEY
        sync: false
      - key: ADMIN_DASHBOARD_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://pet-circle-chi.vercel.app
    healthCheckPath: /health
    autoDeploy: true

  # --- Production API ---
  - type: web
    name: petcircle-api
    env: docker
    region: singapore
    plan: free
    branch: main
    rootDir: .
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: APP_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET_NAME
        value: petcircle-documents
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: WHATSAPP_TEMPLATE_REMINDER
        value: petcircle_reminder_v1
      - key: WHATSAPP_TEMPLATE_OVERDUE
        value: petcircle_overdue_v1
      - key: WHATSAPP_TEMPLATE_NUDGE
        value: petcircle_nudge_v1
      - key: WHATSAPP_TEMPLATE_CONFLICT
        value: petcircle_conflict_v1
      - key: WHATSAPP_TEMPLATE_ONBOARDING_COMPLETE
        value: petcircle_onboarding_complete_v1
      - key: WHATSAPP_TEMPLATE_ORDER_FULFILLMENT_CHECK
        value: order_fulfillment_check_v1
      - key: WHATSAPP_TEMPLATE_BIRTHDAY
        value: birthday_celebration_v1
      - key: ADMIN_SECRET_KEY
        sync: false
      - key: ADMIN_DASHBOARD_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://pet-circle-chi.vercel.app
    healthCheckPath: /health
    autoDeploy: true

